<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Administration WAOULA</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f4f4f4;color:#111}button,input,textarea{font:inherit}.hidden{display:none!important}.top{position:sticky;top:0;z-index:5;background:#050505;color:#fff;padding:15px 22px;display:flex;justify-content:space-between;align-items:center}.top h1{font-size:19px;margin:0}.top button,.btn{border:0;padding:11px 15px;font-weight:800;cursor:pointer}.top button{background:#fff}.login{min-height:100vh;display:grid;place-items:center;padding:22px}.card{background:#fff;border:1px solid #ddd;padding:22px}.login .card{width:min(430px,100%)}.tabs{max-width:1280px;margin:22px auto 0;padding:0 22px;display:flex;gap:8px}.tab{background:#ddd}.tab.active{background:#111;color:#fff}.panel{max-width:1280px;margin:0 auto;padding:22px}.grid{display:grid;grid-template-columns:350px 1fr;gap:20px}.field{margin-bottom:13px}.field label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:6px}.field input,.field textarea{width:100%;padding:11px;border:1px solid #bbb}.field textarea{min-height:100px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.wide{grid-column:1/-1}.primary{background:#050505;color:#fff}.secondary{background:#fff;border:1px solid #111}.danger{background:#991b1b;color:#fff}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.list{display:grid;gap:9px;max-height:70vh;overflow:auto}.item{border:1px solid #ddd;padding:9px;display:grid;grid-template-columns:54px 1fr auto;gap:9px;align-items:center}.item img{width:54px;height:54px;object-fit:cover;background:#eee}.item strong{display:block;font-size:13px}.item small{color:#666}.preview{width:120px;height:120px;object-fit:cover;background:#eee;margin-top:8px}.msg{padding:11px;margin:10px 0;background:#eee}.error{background:#ffe1e1;color:#760000}.ok{background:#e1f7e8;color:#145b2a}.note{font-size:12px;color:#666;line-height:1.5}.section-title{margin-top:0;text-transform:uppercase}.settings{max-width:900px}.status{font-size:12px;color:#ccc}@media(max-width:850px){.grid{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}.wide{grid-column:auto}}
</style></head><body>
<section id="loginView" class="login"><div class="card"><h2>Administration WAOULA</h2><div id="loginMsg"></div><form id="loginForm"><div class="field"><label>E-mail</label><input id="email" type="email" required></div><div class="field"><label>Mot de passe</label><input id="password" type="password" required></div><button class="btn primary">Se connecter</button></form><p class="note">Aucun lien vers cette page n’est affiché sur la boutique.</p></div></section>
<section id="appView" class="hidden"><header class="top"><div><h1>WAOULA · Mini CMS</h1><div id="userStatus" class="status"></div></div><button id="logout">Déconnexion</button></header><div class="tabs"><button class="btn tab active" data-tab="productsPanel">Produits</button><button class="btn tab" data-tab="settingsPanel">Accueil & coordonnées</button></div>
<section id="productsPanel" class="panel"><div class="grid"><aside class="card"><h3 class="section-title">Catalogue</h3><div class="toolbar"><button id="newBtn" class="btn primary">+ Nouveau</button><button id="refreshBtn" class="btn secondary">Actualiser</button></div><div id="productList" class="list"></div></aside><main class="card"><h3 id="formTitle" class="section-title">Ajouter un produit</h3><div id="formMsg"></div><form id="productForm" class="formgrid"><input id="productId" type="hidden">
<div class="field"><label>Nom</label><input id="name" required></div><div class="field"><label>Catégorie</label><input id="category"></div><div class="field"><label>SKU / référence</label><input id="sku"></div><div class="field"><label>Stock total</label><input id="stock" type="number" min="0" value="0"></div><div class="field"><label>Prix normal (€)</label><input id="price" type="number" min="0" step=".01" required></div><div class="field"><label>Prix promotionnel (€)</label><input id="salePrice" type="number" min="0" step=".01"></div><div class="field wide"><label>Description</label><textarea id="description"></textarea></div><div class="field"><label>Tailles (virgules)</label><input id="sizes" placeholder="S, M, L, XL"></div><div class="field"><label>Couleurs (virgules)</label><input id="colors" placeholder="Noir, Blanc"></div><div class="field wide"><label>Variantes détaillées (une par ligne)</label><textarea id="variants" placeholder="Noir | M | 12 | SKU-NOIR-M&#10;Blanc | L | 8 | SKU-BLANC-L"></textarea><p class="note">Format : couleur | taille | stock | SKU</p></div><div class="field"><label>Ordre d’affichage</label><input id="position" type="number" value="0"></div><div class="field"><label><input id="active" type="checkbox" checked> Visible</label><label><input id="featured" type="checkbox"> Produit vedette</label></div><div class="field wide"><label>Image principale</label><input id="mainImage" type="file" accept="image/*"><input id="existingImage" type="hidden"><img id="preview" class="preview hidden"></div><div class="field wide"><label>Galerie d’images</label><input id="galleryImages" type="file" accept="image/*" multiple><p id="galleryNote" class="note"></p></div><div class="wide toolbar"><button class="btn primary">Enregistrer</button><button id="resetBtn" class="btn secondary" type="button">Vider</button><button id="deleteBtn" class="btn danger hidden" type="button">Supprimer</button></div></form></main></div></section>
<section id="settingsPanel" class="panel hidden"><div class="card settings"><h3 class="section-title">Page d’accueil et coordonnées</h3><div id="settingsMsg"></div><form id="settingsForm" class="formgrid"><div class="field"><label>Nom de la boutique</label><input id="shopName"></div><div class="field"><label>Slogan</label><input id="slogan"></div><div class="field"><label>Petit titre d’accueil</label><input id="heroEyebrow"></div><div class="field wide"><label>Grand titre d’accueil</label><textarea id="heroTitle"></textarea></div><div class="field wide"><label>Texte d’accueil</label><textarea id="heroText"></textarea></div><div class="field"><label>Texte du bouton</label><input id="heroButton"></div><div class="field"><label>Média d’accueil (image ou vidéo)</label><input id="heroMedia" type="file" accept="image/*,video/mp4,video/webm"></div><div class="field"><label>Logo</label><input id="logoFile" type="file" accept="image/*"></div><div class="field"><label>E-mail</label><input id="contactEmail" type="email"></div><div class="field"><label>Téléphone</label><input id="phone"></div><div class="field"><label>WhatsApp</label><input id="whatsapp"></div><div class="field"><label>Instagram</label><input id="instagram"></div><div class="field"><label>Facebook</label><input id="facebook"></div><div class="field"><label>TikTok</label><input id="tiktok"></div><div class="field wide"><label>Adresse</label><input id="address"></div><div class="field"><label>Lien de paiement Stripe</label><input id="stripeLink"></div><div class="field"><label>Lien de paiement PayPal</label><input id="paypalLink"></div><div class="wide"><button class="btn primary">Enregistrer les paramètres</button></div></form></div></section></section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script>
const $=id=>document.getElementById(id), configured=window.WAOULA_CONFIG&&WAOULA_CONFIG.supabaseUrl&&!WAOULA_CONFIG.supabaseUrl.includes('VOTRE_')&&WAOULA_CONFIG.supabaseAnonKey&&!WAOULA_CONFIG.supabaseAnonKey.includes('VOTRE_');let sb,products=[],gallery=[],settings={};const msg=(el,t,c='')=>el.innerHTML=t?`<div class="msg ${c}">${t}</div>`:'';const split=v=>v.split(',').map(x=>x.trim()).filter(Boolean);const safe=n=>n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9.]+/g,'-');
async function upload(file){if(!file)return null;if(file.size>10*1024*1024)throw Error('Fichier trop lourd : 10 Mo maximum.');const path=`${Date.now()}-${crypto.randomUUID()}-${safe(file.name)}`;const {error}=await sb.storage.from('site-assets').upload(path,file);if(error)throw error;return sb.storage.from('site-assets').getPublicUrl(path).data.publicUrl}
function parseVariants(v){return v.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>{const [color,size,stock,sku]=line.split('|').map(x=>x.trim());return{color:color||'Standard',size:size||'Unique',stock:Number(stock)||0,sku:sku||''}})}function formatVariants(v){return(v||[]).map(x=>`${x.color||''} | ${x.size||''} | ${x.stock||0} | ${x.sku||''}`).join('\n')}
function resetForm(){gallery=[];$('productForm').reset();$('productId').value='';$('active').checked=true;$('stock').value=0;$('position').value=0;$('existingImage').value='';$('preview').classList.add('hidden');$('galleryNote').textContent='';$('formTitle').textContent='Ajouter un produit';$('deleteBtn').classList.add('hidden');msg($('formMsg'),'')}
async function loadProducts(){const {data,error}=await sb.from('products').select('*').order('position').order('created_at',{ascending:false});if(error)return msg($('formMsg'),error.message,'error');products=data||[];renderList()}
function renderList(){$('productList').innerHTML=products.length?products.map(p=>`<div class="item"><img src="${p.image_url||''}"><div><strong>${p.name}</strong><small>${p.category||'Sans catégorie'} · ${Number(p.sale_price||p.price).toFixed(2)} € · stock ${p.stock}</small></div><button class="btn secondary" data-edit="${p.id}">Modifier</button></div>`).join(''):'<p>Aucun produit.</p>';document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(b.dataset.edit))}
function edit(id){const p=products.find(x=>x.id===id);if(!p)return;for(const [k,v] of Object.entries({productId:p.id,name:p.name,category:p.category||'',sku:p.sku||'',stock:p.stock||0,price:p.price,salePrice:p.sale_price??'',description:p.description||'',sizes:(p.sizes||[]).join(', '),colors:(p.colors||[]).join(', '),variants:formatVariants(p.variants),position:p.position||0,existingImage:p.image_url||''}))$(k).value=v;$('active').checked=!!p.active;$('featured').checked=!!p.featured;gallery=[...(p.gallery||[])];if(p.image_url){$('preview').src=p.image_url;$('preview').classList.remove('hidden')}$('galleryNote').textContent=gallery.length?`${gallery.length} image(s) enregistrée(s).`:'';$('formTitle').textContent='Modifier le produit';$('deleteBtn').classList.remove('hidden');scrollTo({top:0,behavior:'smooth'})}
$('productForm').onsubmit=async e=>{e.preventDefault();msg($('formMsg'),'Enregistrement…');try{let image=$('existingImage').value;if($('mainImage').files[0])image=await upload($('mainImage').files[0]);if(!image)throw Error('Ajoute une image principale.');for(const f of $('galleryImages').files)gallery.push(await upload(f));gallery=[image,...gallery.filter(x=>x&&x!==image)];const sale=$('salePrice').value.trim();const row={name:$('name').value.trim(),category:$('category').value.trim(),sku:$('sku').value.trim(),stock:Number($('stock').value)||0,price:Number($('price').value),sale_price:sale===''?null:Number(sale),description:$('description').value.trim(),sizes:split($('sizes').value).length?split($('sizes').value):['Unique'],colors:split($('colors').value).length?split($('colors').value):['Standard'],variants:parseVariants($('variants').value),image_url:image,gallery,featured:$('featured').checked,position:Number($('position').value)||0,active:$('active').checked,updated_at:new Date().toISOString()};const id=$('productId').value,r=id?await sb.from('products').update(row).eq('id',id):await sb.from('products').insert(row);if(r.error)throw r.error;msg($('formMsg'),'Produit enregistré et publié.','ok');resetForm();await loadProducts()}catch(x){msg($('formMsg'),x.message,'error')}};
$('deleteBtn').onclick=async()=>{const id=$('productId').value;if(!id||!confirm('Supprimer ce produit ?'))return;const{error}=await sb.from('products').delete().eq('id',id);if(error)return msg($('formMsg'),error.message,'error');resetForm();loadProducts()};$('mainImage').onchange=e=>{if(e.target.files[0]){$('preview').src=URL.createObjectURL(e.target.files[0]);$('preview').classList.remove('hidden')}};$('newBtn').onclick=$('resetBtn').onclick=resetForm;$('refreshBtn').onclick=loadProducts;
async function loadSettings(){const{data,error}=await sb.from('site_settings').select('*').eq('id',1).single();if(error)return msg($('settingsMsg'),error.message,'error');settings=data||{};const map={shopName:'shop_name',slogan:'slogan',heroEyebrow:'hero_eyebrow',heroTitle:'hero_title',heroText:'hero_text',heroButton:'hero_button',contactEmail:'email',phone:'phone',whatsapp:'whatsapp',instagram:'instagram',facebook:'facebook',tiktok:'tiktok',address:'address',stripeLink:'stripe_link',paypalLink:'paypal_link'};for(const[k,v]of Object.entries(map))$(k).value=settings[v]||''}
$('settingsForm').onsubmit=async e=>{e.preventDefault();msg($('settingsMsg'),'Enregistrement…');try{let hero=settings.hero_media_url||'',logo=settings.logo_url||'';if($('heroMedia').files[0])hero=await upload($('heroMedia').files[0]);if($('logoFile').files[0])logo=await upload($('logoFile').files[0]);const row={id:1,shop_name:$('shopName').value.trim(),slogan:$('slogan').value.trim(),hero_eyebrow:$('heroEyebrow').value.trim(),hero_title:$('heroTitle').value.trim(),hero_text:$('heroText').value.trim(),hero_button:$('heroButton').value.trim(),hero_media_url:hero,logo_url:logo,email:$('contactEmail').value.trim(),phone:$('phone').value.trim(),whatsapp:$('whatsapp').value.trim(),instagram:$('instagram').value.trim(),facebook:$('facebook').value.trim(),tiktok:$('tiktok').value.trim(),address:$('address').value.trim(),stripe_link:$('stripeLink').value.trim(),paypal_link:$('paypalLink').value.trim(),updated_at:new Date().toISOString()};const{error}=await sb.from('site_settings').upsert(row);if(error)throw error;settings=row;msg($('settingsMsg'),'Paramètres enregistrés.','ok')}catch(x){msg($('settingsMsg'),x.message,'error')}};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['productsPanel','settingsPanel'].forEach(id=>$(id).classList.toggle('hidden',id!==b.dataset.tab))});$('loginForm').onsubmit=async e=>{e.preventDefault();const{error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(error)msg($('loginMsg'),error.message,'error')};$('logout').onclick=()=>sb.auth.signOut();
async function init(){if(!configured){$('loginView').innerHTML='<div class="card"><h2>Configuration requise</h2><p>Complète config.js puis exécute supabase-setup.sql.</p></div>';return}sb=supabase.createClient(WAOULA_CONFIG.supabaseUrl,WAOULA_CONFIG.supabaseAnonKey);sb.auth.onAuthStateChange(async(_,s)=>{const ok=!!s;$('loginView').classList.toggle('hidden',ok);$('appView').classList.toggle('hidden',!ok);if(ok){$('userStatus').textContent=s.user.email;await Promise.all([loadProducts(),loadSettings()])}});await sb.auth.getSession()}init();
</script></body></html>
